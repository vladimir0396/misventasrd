<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MisVentasRD</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* Fondo general */
body{
background-color:#f4f6f9;
}

/* Navbar */
.navbar{
background: linear-gradient(90deg,#0d3b8e,#1a5fd0);
}

/* Banner principal */
.hero{
background: linear-gradient(90deg,#1a5fd0,#0d3b8e);
color:white;
padding:60px 0;
}

.hero h1{
font-weight:700;
}

.btn-warning{
font-weight:bold;
}

/* Cards */
.card{
border:none;
border-radius:15px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.precio{
color:#d90429;
font-weight:bold;
font-size:18px;
}

.footer{
background:#0d3b8e;
color:white;
padding:20px;
margin-top:40px;
text-align:center;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand fw-bold" href="#">🛍️ MisVentasRD</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav me-auto">
<li class="nav-item"><a class="nav-link active" href="#">Inicio</a></li>
<li class="nav-item"><a class="nav-link" href="#">Categorías</a></li>
<li class="nav-item"><a class="nav-link" href="#">Vender</a></li>
<li class="nav-item"><a class="nav-link" href="#">Mi Cuenta</a></li>
</ul>

<form class="d-flex">
<input class="form-control me-2" type="search" placeholder="¿Qué estás buscando?">
<button class="btn btn-warning">Buscar</button>
</form>

</div>
</div>
</nav>

<!-- HERO -->
<section class="hero text-center">
<div class="container">
<h1>¡Compra y Vende Seguro!</h1>
<p class="lead">Publica tus productos y vende en toda República Dominicana</p>
<button class="btn btn-warning btn-lg">¡Comienza Ahora!</button>
</div>
</section>

<!-- PRODUCTOS -->
<section class="container mt-5">
<h2 class="mb-4">Últimos Productos</h2>

<div class="row g-4">

<div class="col-md-4">
<div class="card shadow">
<img src="https://via.placeholder.com/400x250" class="card-img-top">
<div class="card-body">
<h5>Camisa Hombre</h5>
<p class="precio">RD$ 1,200</p>
<button class="btn btn-primary w-100">Agregar</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card shadow">
<img src="https://via.placeholder.com/400x250" class="card-img-top">
<div class="card-body">
<h5>Zapatos Mujer</h5>
<p class="precio">RD$ 2,500</p>
<button class="btn btn-primary w-100">Agregar</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card shadow">
<img src="https://via.placeholder.com/400x250" class="card-img-top">
<div class="card-body">
<h5>Smart TV 55"</h5>
<p class="precio">RD$ 28,000</p>
<button class="btn btn-primary w-100">Agregar</button>
</div>
</div>
</div>

</div>
</section>

<!-- FOOTER -->
<div class="footer">
© 2026 MisVentasRD - Todos los derechos reservados
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
