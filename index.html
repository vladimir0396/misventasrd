<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MisVentasRD</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
<div class="logo">MisVentasRD</div>
</header>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">MisVentasRD</a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="#">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Categorías</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Vender</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Mi Cuenta</a></li>
      </ul>

      <!-- Barra de búsqueda -->
      <form class="d-flex">
        <input class="form-control me-2" type="search" placeholder="¿Qué estás buscando?">
        <button class="btn btn-warning">Buscar</button>
      </form>
    </div>
  </div>
</nav>
<section class="productos">

<div class="card">
<img src="https://via.placeholder.com/300x200" class="imgProducto">

<h3>Camisa Hombre</h3>
<p class="precio">RD$ <span id="precioCamisaMostrado">0</span></p>

<button onclick="agregarAlCarrito('Camisa Hombre', precioCamisa)">
Agregar
</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x200" class="imgProducto">

<h3>Zapatos Mujer</h3>
<p class="precio">RD$ <span id="precioZapatosMostrado">0</span></p>

<button onclick="agregarAlCarrito('Zapatos Mujer', precioZapatos)">
Agregar
</button>
</div>

</section>

<section class="carritoBox">

<h2>Carrito</h2>
<ul id="listaCarrito"></ul>

<p>Subtotal: RD$<span id="subtotal">0</span></p>
<p>Envío: RD$<span id="envioMostrado">0</span></p>
<p>Total: RD$<span id="total">0</span></p>

</section>

<section class="checkout">

<h2>Datos del Cliente</h2>

<input type="text" id="nombreCliente" placeholder="Nombre Completo">

<select id="ciudad">
<option>La Vega</option>
<option>Santiago</option>
<option>Bonao</option>
<option>Cotuí</option>
<option>San Francisco de Macorís</option>
</select>

<select id="metodoPago">
<option>Contra Entrega</option>
<option>Transferencia Banreservas</option>
<option>Transferencia BHD</option>
<option>Popular / Qik</option>
</select>

<button onclick="enviarPedido()">Finalizar Pedido</button>

</section>

<script src="carrito.js"></script>

</body>
</html>
